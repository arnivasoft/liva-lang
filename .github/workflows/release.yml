name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  # ============================================================
  # Windows — .msi installer + .zip portable
  # ============================================================
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 21
        run: |
          choco install llvm --version=21.0.0 -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Package (ZIP)
        run: |
          cd build
          cpack -G ZIP

      - name: Package (WIX MSI)
        continue-on-error: true
        run: |
          choco install wixtoolset -y
          cd build
          cpack -G WIX

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liva-windows-x64
          path: |
            build/liva-*.zip
            build/liva-*.msi

  # ============================================================
  # Linux — .deb package + .tar.gz portable
  # ============================================================
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build dpkg-dev

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Package (DEB + TGZ)
        run: |
          cd build
          cpack -G DEB
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liva-linux-x64
          path: |
            build/liva-*.deb
            build/liva-*.tar.gz

  # ============================================================
  # macOS — .tar.gz portable (x64 + arm64)
  # ============================================================
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Package (TGZ)
        run: |
          cd build
          cpack -G TGZ

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liva-macos-${{ matrix.arch }}
          path: build/liva-*.tar.gz

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.tar.gz
          body: |
            ## Liva Compiler ${{ github.ref_name }}

            ### Downloads

            | Platform | Package | Type |
            |----------|---------|------|
            | Windows x64 | `.msi` | Installer (adds to PATH) |
            | Windows x64 | `.zip` | Portable |
            | Linux x64 | `.deb` | Debian/Ubuntu package |
            | Linux x64 | `.tar.gz` | Portable |
            | macOS arm64 | `.tar.gz` | Apple Silicon |
            | macOS x64 | `.tar.gz` | Intel |

            ### Installation

            **Windows (MSI):** Download and run the `.msi` installer.

            **Linux (Debian/Ubuntu):**
            ```bash
            sudo dpkg -i liva-*.deb
            ```

            **macOS (Homebrew):**
            ```bash
            brew install liva-lang/tap/liva
            ```

            **Portable (all platforms):** Extract the archive and add `bin/` to your PATH.
