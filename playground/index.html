<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liva Playground</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #181825;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #313244;
        }
        header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #cba6f7;
        }
        header h1 span { color: #89b4fa; font-weight: 400; }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        button {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
        }
        button:hover { background: #45475a; }
        button.primary {
            background: #89b4fa;
            color: #1e1e2e;
            border-color: #89b4fa;
            font-weight: 600;
        }
        button.primary:hover { background: #74c7ec; }
        .main {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .panel-header {
            background: #181825;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #313244;
        }
        .divider {
            width: 4px;
            background: #313244;
            cursor: col-resize;
        }
        .divider:hover { background: #89b4fa; }
        #editor {
            flex: 1;
            padding: 16px;
            background: #1e1e2e;
            font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #cdd6f4;
            border: none;
            outline: none;
            resize: none;
            tab-size: 4;
            overflow: auto;
        }
        #output {
            flex: 1;
            padding: 16px;
            background: #11111b;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow: auto;
            white-space: pre-wrap;
        }
        .output-line { margin-bottom: 2px; }
        .output-error { color: #f38ba8; }
        .output-info { color: #a6adc8; }
        .output-success { color: #a6e3a1; }
        .output-warn { color: #fab387; }
        select {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        footer {
            background: #181825;
            padding: 6px 24px;
            font-size: 12px;
            color: #585b70;
            border-top: 1px solid #313244;
            display: flex;
            justify-content: space-between;
        }
        .status { color: #a6adc8; }
        .status.running { color: #fab387; }
        .status.done { color: #a6e3a1; }
        .status.error { color: #f38ba8; }
    </style>
</head>
<body>
    <header>
        <h1>Liva <span>Playground</span></h1>
        <select id="examples">
            <option value="">-- Examples --</option>
            <option value="hello">Hello World</option>
            <option value="fibonacci">Fibonacci</option>
            <option value="structs">Structs & Methods</option>
            <option value="closures">Closures</option>
            <option value="generics">Generics</option>
            <option value="pattern">Pattern Matching</option>
            <option value="async">Async/Await</option>
        </select>
        <div class="toolbar">
            <button class="primary" onclick="runCode()" title="Ctrl+Enter">Run</button>
            <button onclick="clearOutput()">Clear</button>
            <button onclick="shareCode()">Share</button>
        </div>
    </header>
    <div class="main">
        <div class="panel">
            <div class="panel-header">Source Code</div>
            <textarea id="editor" spellcheck="false">// Welcome to the Liva Playground!
// Write Liva code here and click Run.

func fibonacci(n: i32) -> i32 {
    if n <= 1 {
        return n
    }
    return fibonacci(n - 1) + fibonacci(n - 2)
}

func main() {
    println("Liva Playground")
    println("===============")

    for i in 0..10 {
        let fib = fibonacci(i)
        println("fib(\(i)) = \(fib)")
    }
}</textarea>
        </div>
        <div class="divider" id="divider"></div>
        <div class="panel">
            <div class="panel-header">Output</div>
            <div id="output">
                <div class="output-line output-info">Press Run (Ctrl+Enter) to execute your code.</div>
            </div>
        </div>
    </div>
    <footer>
        <span>Liva Language v1.0 | WASM Backend</span>
        <span class="status" id="status">Ready</span>
    </footer>

    <script>
    const EXAMPLES = {
        hello: `// Hello World
func main() {
    println("Hello, World!")
    println("Welcome to Liva!")
}`,
        fibonacci: `// Fibonacci sequence
func fibonacci(n: i32) -> i32 {
    if n <= 1 {
        return n
    }
    return fibonacci(n - 1) + fibonacci(n - 2)
}

func main() {
    for i in 0..15 {
        println("fib(\\(i)) = \\(fibonacci(i))")
    }
}`,
        structs: `// Structs and Methods
struct Point {
    var x: f64
    var y: f64
}

impl Point {
    func distance(ref self, other: Point) -> f64 {
        let dx = self.x - other.x
        let dy = self.y - other.y
        return sqrt(dx * dx + dy * dy)
    }

    func toString(ref self) -> String {
        return "(\\(self.x), \\(self.y))"
    }
}

func main() {
    let a = Point { x: 3.0, y: 4.0 }
    let b = Point { x: 0.0, y: 0.0 }
    println("A = \\(a.toString())")
    println("B = \\(b.toString())")
    println("Distance = \\(a.distance(b))")
}`,
        closures: `// Closures and Higher-Order Functions
func apply(value: i32, transform: (i32) -> i32) -> i32 {
    return transform(value)
}

func main() {
    let doubled = apply(5) |x| { return x * 2 }
    let squared = apply(5) |x| { return x * x }

    println("5 doubled = \\(doubled)")
    println("5 squared = \\(squared)")

    let numbers = [1, 2, 3, 4, 5]
    let evens = numbers.filter |n| { return n % 2 == 0 }
    let sum = numbers.reduce(0) |acc, n| { return acc + n }

    println("Evens: \\(evens)")
    println("Sum: \\(sum)")
}`,
        generics: `// Generics
func swapValues<T>(a: T, b: T) -> (T, T) {
    return (b, a)
}

struct Pair<T> {
    var first: T
    var second: T
}

impl Pair<T> {
    func toString(ref self) -> String {
        return "(\\(self.first), \\(self.second))"
    }
}

func main() {
    let (a, b) = swapValues(1, 2)
    println("Swapped: \\(a), \\(b)")

    let pair = Pair<String> { first: "hello", second: "world" }
    println("Pair: \\(pair.toString())")
}`,
        pattern: `// Pattern Matching
enum Shape {
    case Circle(f64)
    case Rectangle(f64, f64)
    case Triangle(f64, f64)
}

func area(shape: Shape) -> f64 {
    match shape {
        case .Circle(r) => return 3.14159 * r * r
        case .Rectangle(w, h) => return w * h
        case .Triangle(b, h) => return 0.5 * b * h
    }
}

func describe(shape: Shape) -> String {
    match shape {
        case .Circle(_) => return "Circle"
        case .Rectangle(_, _) => return "Rectangle"
        case .Triangle(_, _) => return "Triangle"
    }
}

func main() {
    let shapes = [
        Shape.Circle(5.0),
        Shape.Rectangle(3.0, 4.0),
        Shape.Triangle(6.0, 8.0)
    ]

    for shape in shapes {
        println("\\(describe(shape)): area = \\(area(shape))")
    }
}`,
        async: `// Async/Await
async func fetchData(url: String) -> String {
    sleep(100)  // Simulate network delay
    return "Data from \\(url)"
}

async func main() {
    println("Fetching data...")
    let result = await fetchData("https://api.example.com")
    println(result)
    println("Done!")
}`
    };

    // Example selector
    document.getElementById('examples').addEventListener('change', function() {
        if (this.value && EXAMPLES[this.value]) {
            document.getElementById('editor').value = EXAMPLES[this.value];
            this.value = '';
        }
    });

    // Keyboard shortcut
    document.getElementById('editor').addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            runCode();
        }
        // Tab support
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = this.selectionStart;
            this.value = this.value.substring(0, start) + '    ' + this.value.substring(this.selectionEnd);
            this.selectionStart = this.selectionEnd = start + 4;
        }
    });

    function setStatus(text, cls) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className = 'status ' + (cls || '');
    }

    function appendOutput(text, cls) {
        const el = document.getElementById('output');
        const line = document.createElement('div');
        line.className = 'output-line ' + (cls || '');
        line.textContent = text;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
    }

    function clearOutput() {
        document.getElementById('output').innerHTML = '';
    }

    function runCode() {
        const code = document.getElementById('editor').value;
        clearOutput();
        setStatus('Compiling...', 'running');

        setTimeout(() => {
            const errors = checkSyntax(code);
            if (errors.length > 0) {
                for (const err of errors) appendOutput('error: ' + err, 'output-error');
                setStatus('Compilation failed', 'error');
                return;
            }

            try {
                appendOutput('--- Liva Interpreter v1.0 ---', 'output-info');
                appendOutput('', '');
                executeCode(code);
                appendOutput('', '');
                appendOutput('--- Execution complete ---', 'output-info');
                setStatus('Done', 'done');
            } catch (e) {
                appendOutput('error: ' + e.message, 'output-error');
                setStatus('Runtime error', 'error');
            }
        }, 50);
    }

    // ================================================================
    // Liva JS Interpreter — Real lexer + parser + evaluator
    // ================================================================

    class LivaInterpreter {
        constructor(outputFn) { this.output = outputFn; this.globals = {}; this.funcs = {}; }

        run(code) {
            this.globals = {}; this.funcs = {};
            // Built-in functions
            this.funcs['println'] = (args) => { this.output(args.map(a => this.stringify(a)).join(' ')); return null; };
            this.funcs['print'] = (args) => { this.output(args.map(a => this.stringify(a)).join(' ')); return null; };
            this.funcs['toString'] = (args) => String(args[0]);
            this.funcs['abs'] = (args) => Math.abs(args[0]);
            this.funcs['min'] = (args) => Math.min(args[0], args[1]);
            this.funcs['max'] = (args) => Math.max(args[0], args[1]);
            this.funcs['sqrt'] = (args) => Math.sqrt(args[0]);
            this.funcs['pow'] = (args) => Math.pow(args[0], args[1]);
            this.funcs['floor'] = (args) => Math.floor(args[0]);
            this.funcs['ceil'] = (args) => Math.ceil(args[0]);
            this.funcs['round'] = (args) => Math.round(args[0]);
            this.funcs['len'] = (args) => Array.isArray(args[0]) ? args[0].length : String(args[0]).length;

            const tokens = this.lex(code);
            const ast = this.parse(tokens);
            // Register user functions
            for (const node of ast) {
                if (node.type === 'func') this.funcs[node.name] = node;
            }
            // Call main
            if (!this.funcs['main']) throw new Error("missing 'func main()' entry point");
            const mainFn = this.funcs['main'];
            if (typeof mainFn === 'function') mainFn([]);
            else this.execBlock(mainFn.body, {});
        }

        stringify(v) {
            if (v === null || v === undefined) return 'nil';
            if (v === true) return 'true';
            if (v === false) return 'false';
            if (Array.isArray(v)) return '[' + v.map(e => this.stringify(e)).join(', ') + ']';
            return String(v);
        }

        // === Lexer ===
        lex(code) {
            const tokens = []; let i = 0;
            const kw = new Set(['func','let','var','if','else','while','for','in','return','true','false','nil','match','case','struct','enum','impl','protocol','import','pub','async','await','yield','const','break','continue']);
            while (i < code.length) {
                if (code[i] === '/' && code[i+1] === '/') { while (i < code.length && code[i] !== '\n') i++; continue; }
                if (/\s/.test(code[i])) { i++; continue; }
                if (code[i] === '"') { let s = ''; i++;
                    while (i < code.length && code[i] !== '"') {
                        if (code[i] === '\\' && code[i+1] === '(') { s += '${'; i += 2;
                            let d = 1; while (i < code.length && d > 0) { if (code[i]==='(') d++; if (code[i]===')') d--; if (d>0) s += code[i]; i++; }
                            s += '}'; continue; }
                        if (code[i] === '\\') { i++; const esc = {n:'\n',t:'\t',r:'\r','\\':'\\','"':'"'}; s += esc[code[i]] || code[i]; }
                        else s += code[i]; i++;
                    } i++; tokens.push({type:'string', value:s}); continue; }
                if (/[0-9]/.test(code[i])) { let n = ''; while (i < code.length && /[0-9.]/.test(code[i])) n += code[i++];
                    tokens.push({type:'number', value: n.includes('.') ? parseFloat(n) : parseInt(n)}); continue; }
                if (/[a-zA-Z_]/.test(code[i])) { let id = ''; while (i < code.length && /[a-zA-Z0-9_]/.test(code[i])) id += code[i++];
                    tokens.push({type: kw.has(id) ? id : (id==='true'||id==='false' ? 'bool' : 'id'), value: id==='true'?true:id==='false'?false:id}); continue; }
                const two = code.substring(i, i+2);
                if (['==','!=','<=','>=','&&','||','->','=>','..'].includes(two)) { tokens.push({type:two}); i+=2; continue; }
                tokens.push({type:code[i]}); i++;
            }
            tokens.push({type:'eof'}); return tokens;
        }

        // === Parser ===
        parse(tokens) { this.tokens = tokens; this.pos = 0; const ast = [];
            while (this.peek().type !== 'eof') {
                if (this.peek().type === 'func' || this.peek().type === 'async') ast.push(this.parseFunc());
                else if (['import','struct','enum','impl','protocol','pub'].includes(this.peek().type)) this.skipDecl();
                else this.pos++;
            } return ast; }
        peek() { return this.tokens[this.pos] || {type:'eof'}; }
        advance() { return this.tokens[this.pos++]; }
        expect(t) { const tok = this.advance(); if (tok.type !== t) throw new Error(`expected '${t}', got '${tok.type}'`); return tok; }
        match(t) { if (this.peek().type === t) { this.advance(); return true; } return false; }

        skipDecl() { let d = 0; do { const t = this.advance();
            if (t.type === '{') d++; else if (t.type === '}') d--; } while (d > 0 && this.peek().type !== 'eof'); }

        parseFunc() { const isAsync = this.match('async'); this.expect('func');
            const name = this.advance().value; this.expect('(');
            const params = []; if (this.peek().type !== ')') { do {
                const p = this.advance().value; if (this.match(':')) this.skipType();
                params.push(p); } while (this.match(',')); } this.expect(')');
            if (this.match('->')) this.skipType();
            const body = this.parseBlock();
            return {type:'func', name, params, body, isAsync}; }

        skipType() { while (![')',',','{','}','eof'].includes(this.peek().type)) this.advance(); }

        parseBlock() { this.expect('{'); const stmts = [];
            while (this.peek().type !== '}' && this.peek().type !== 'eof') stmts.push(this.parseStmt());
            this.expect('}'); return stmts; }

        parseStmt() {
            if (this.peek().type === 'let' || this.peek().type === 'var') return this.parseVarDecl();
            if (this.peek().type === 'return') { this.advance(); const v = this.peek().type === '}' ? null : this.parseExpr(); return {type:'return', value:v}; }
            if (this.peek().type === 'if') return this.parseIf();
            if (this.peek().type === 'while') return this.parseWhile();
            if (this.peek().type === 'for') return this.parseFor();
            if (this.peek().type === 'break') { this.advance(); return {type:'break'}; }
            if (this.peek().type === 'continue') { this.advance(); return {type:'continue'}; }
            if (this.peek().type === '{') return {type:'block', body: this.parseBlock()};
            const expr = this.parseExpr();
            if (this.match('=')) { const val = this.parseExpr(); return {type:'assign', target:expr, value:val}; }
            return {type:'expr', expr}; }

        parseVarDecl() { const mut = this.advance().type === 'var';
            const name = this.advance().value; let tAnnot = null;
            if (this.match(':')) { tAnnot = []; while (!['=','}','\n','eof'].includes(this.peek().type) && this.peek().type !== 'id') { tAnnot.push(this.advance()); if (this.peek().type === 'id') break; } }
            let init = null; if (this.match('=')) init = this.parseExpr();
            return {type:'var', name, mut, init}; }

        parseIf() { this.expect('if'); const cond = this.parseExpr(); const then = this.parseBlock();
            let els = null; if (this.match('else')) { els = this.peek().type === 'if' ? [this.parseIf()] : this.parseBlock(); }
            return {type:'if', cond, then, else:els}; }
        parseWhile() { this.expect('while'); const cond = this.parseExpr(); const body = this.parseBlock(); return {type:'while', cond, body}; }
        parseFor() { this.expect('for'); const varName = this.advance().value; this.expect('in');
            const iter = this.parseExpr(); const body = this.parseBlock(); return {type:'for', var:varName, iter, body}; }

        parseExpr() { return this.parseOr(); }
        parseOr() { let l = this.parseAnd(); while (this.match('||')) { const r = this.parseAnd(); l = {type:'bin',op:'||',l,r}; } return l; }
        parseAnd() { let l = this.parseEq(); while (this.match('&&')) { const r = this.parseEq(); l = {type:'bin',op:'&&',l,r}; } return l; }
        parseEq() { let l = this.parseCmp(); while (this.peek().type === '==' || this.peek().type === '!=') { const op = this.advance().type; l = {type:'bin',op,l,r:this.parseCmp()}; } return l; }
        parseCmp() { let l = this.parseAdd(); while (['<','<=','>','>='].includes(this.peek().type)) { const op = this.advance().type; l = {type:'bin',op,l,r:this.parseAdd()}; } return l; }
        parseAdd() { let l = this.parseMul(); while (['+','-'].includes(this.peek().type)) { const op = this.advance().type; l = {type:'bin',op,l,r:this.parseMul()}; } return l; }
        parseMul() { let l = this.parseUnary(); while (['*','/','%'].includes(this.peek().type)) { const op = this.advance().type; l = {type:'bin',op,l,r:this.parseUnary()}; } return l; }
        parseUnary() { if (this.match('-')) return {type:'unary',op:'-',expr:this.parseUnary()};
            if (this.match('!')) return {type:'unary',op:'!',expr:this.parseUnary()};
            return this.parsePostfix(); }
        parsePostfix() { let e = this.parsePrimary();
            while (true) { if (this.match('(')) { const args = []; if (this.peek().type !== ')') { do { args.push(this.parseExpr()); } while (this.match(',')); }
                this.expect(')'); e = {type:'call', callee:e, args}; }
            else if (this.match('.')) { const m = this.advance().value; e = {type:'member', obj:e, member:m}; }
            else if (this.match('[')) { const idx = this.parseExpr(); this.expect(']'); e = {type:'index', obj:e, index:idx}; }
            else break; } return e; }
        parsePrimary() {
            if (this.peek().type === 'number') return {type:'lit', value: this.advance().value};
            if (this.peek().type === 'string') { const s = this.advance().value; return {type:'str', value:s}; }
            if (this.peek().type === 'bool') return {type:'lit', value: this.advance().value};
            if (this.peek().type === 'nil') { this.advance(); return {type:'lit', value:null}; }
            if (this.peek().type === 'id') { return {type:'id', name: this.advance().value}; }
            if (this.match('(')) { const e = this.parseExpr(); this.expect(')'); return e; }
            if (this.match('[')) { const elems = []; if (this.peek().type !== ']') { do { elems.push(this.parseExpr()); } while (this.match(',')); }
                this.expect(']'); return {type:'array', elems}; }
            if (this.peek().type === '..') { this.advance(); return {type:'range', start:{type:'lit',value:0}, end:this.parseExpr()}; }
            throw new Error(`unexpected token: ${this.peek().type} (${this.peek().value || ''})`); }

        // === Evaluator ===
        execBlock(stmts, env) {
            for (const stmt of stmts) {
                const r = this.execStmt(stmt, env);
                if (r && (r.type === 'return' || r.type === 'break' || r.type === 'continue')) return r;
            } return null; }

        execStmt(stmt, env) {
            switch (stmt.type) {
            case 'var': env[stmt.name] = stmt.init ? this.evalExpr(stmt.init, env) : null; return null;
            case 'expr': this.evalExpr(stmt.expr, env); return null;
            case 'return': return {type:'return', value: stmt.value ? this.evalExpr(stmt.value, env) : null};
            case 'assign': { const val = this.evalExpr(stmt.value, env);
                if (stmt.target.type === 'id') env[stmt.target.name] = val;
                else if (stmt.target.type === 'index') { const arr = this.evalExpr(stmt.target.obj, env); arr[this.evalExpr(stmt.target.index, env)] = val; }
                return null; }
            case 'if': { const c = this.evalExpr(stmt.cond, env);
                if (c) return this.execBlock(stmt.then, env);
                if (stmt.else) return this.execBlock(stmt.else, env); return null; }
            case 'while': { while (true) { if (!this.evalExpr(stmt.cond, env)) break;
                const r = this.execBlock(stmt.body, env);
                if (r?.type === 'break') break; if (r?.type === 'return') return r; } return null; }
            case 'for': { const iter = this.evalExpr(stmt.iter, env);
                if (Array.isArray(iter)) { for (const item of iter) { env[stmt.var] = item;
                    const r = this.execBlock(stmt.body, env);
                    if (r?.type === 'break') break; if (r?.type === 'return') return r; } }
                else if (iter && iter._range) { for (let i = iter.start; i < iter.end; i++) { env[stmt.var] = i;
                    const r = this.execBlock(stmt.body, env);
                    if (r?.type === 'break') break; if (r?.type === 'return') return r; } }
                return null; }
            case 'block': return this.execBlock(stmt.body, env);
            case 'break': return {type:'break'};
            case 'continue': return {type:'continue'};
            default: return null; } }

        evalExpr(expr, env) {
            if (!expr) return null;
            switch (expr.type) {
            case 'lit': return expr.value;
            case 'str': { let s = expr.value; s = s.replace(/\$\{([^}]+)\}/g, (_, e) => {
                try { const tokens = this.lex(e); const mini = this.parse_expr_tokens(tokens);
                    return this.stringify(this.evalExpr(mini, env)); } catch { return e; } }); return s; }
            case 'id': if (expr.name in env) return env[expr.name];
                if (expr.name in this.globals) return this.globals[expr.name]; return undefined;
            case 'array': return expr.elems.map(e => this.evalExpr(e, env));
            case 'range': return {_range:true, start: this.evalExpr(expr.start, env), end: this.evalExpr(expr.end, env)};
            case 'bin': { const l = this.evalExpr(expr.l, env), r = this.evalExpr(expr.r, env);
                switch (expr.op) { case '+': return (typeof l === 'string' || typeof r === 'string') ? String(l)+String(r) : l+r;
                    case '-': return l-r; case '*': return l*r; case '/': return r!==0?l/r:0; case '%': return l%r;
                    case '==': return l===r; case '!=': return l!==r; case '<': return l<r; case '<=': return l<=r;
                    case '>': return l>r; case '>=': return l>=r; case '&&': return l&&r; case '||': return l||r;
                    case '..': return {_range:true, start:l, end:r}; } return null; }
            case 'unary': { const v = this.evalExpr(expr.expr, env);
                if (expr.op === '-') return -v; if (expr.op === '!') return !v; return v; }
            case 'call': { const callee = expr.callee.type === 'id' ? expr.callee.name :
                (expr.callee.type === 'member' ? expr.callee.member : null);
                const args = expr.args.map(a => this.evalExpr(a, env));
                if (typeof this.funcs[callee] === 'function') return this.funcs[callee](args);
                if (this.funcs[callee]) { const fn = this.funcs[callee]; const local = {};
                    for (let i = 0; i < fn.params.length; i++) local[fn.params[i]] = args[i];
                    const r = this.execBlock(fn.body, local);
                    return r?.type === 'return' ? r.value : null; }
                // Array methods
                if (expr.callee.type === 'member') { const obj = this.evalExpr(expr.callee.obj, env);
                    if (Array.isArray(obj)) {
                        if (expr.callee.member === 'length') return obj.length;
                        if (expr.callee.member === 'push') { obj.push(args[0]); return null; }
                        if (expr.callee.member === 'pop') return obj.pop();
                    }
                    if (typeof obj === 'string') { if (expr.callee.member === 'length') return obj.length; }
                }
                throw new Error(`undefined function: ${callee}`); }
            case 'member': { const obj = this.evalExpr(expr.obj, env);
                if (Array.isArray(obj) && expr.member === 'length') return obj.length;
                if (typeof obj === 'string' && expr.member === 'length') return obj.length;
                return obj?.[expr.member]; }
            case 'index': { const obj = this.evalExpr(expr.obj, env); const idx = this.evalExpr(expr.index, env);
                return Array.isArray(obj) ? obj[idx] : String(obj)[idx]; }
            default: return null; } }

        parse_expr_tokens(tokens) { const saved = [this.tokens, this.pos];
            this.tokens = tokens; this.pos = 0;
            const e = this.parseExpr(); [this.tokens, this.pos] = saved; return e; }
    }

    function checkSyntax(code) {
        const errors = [];
        let braces = 0, parens = 0, brackets = 0;
        for (const ch of code) {
            if (ch === '{') braces++; else if (ch === '}') braces--;
            else if (ch === '(') parens++; else if (ch === ')') parens--;
            else if (ch === '[') brackets++; else if (ch === ']') brackets--;
        }
        if (braces !== 0) errors.push('unbalanced braces');
        if (parens !== 0) errors.push('unbalanced parentheses');
        if (brackets !== 0) errors.push('unbalanced brackets');
        return errors;
    }

    function executeCode(code) {
        const interp = new LivaInterpreter((text) => appendOutput(text, ''));
        interp.run(code);
    }

    function shareCode() {
        const code = document.getElementById('editor').value;
        const encoded = btoa(unescape(encodeURIComponent(code)));
        const url = window.location.origin + window.location.pathname + '?code=' + encoded;
        navigator.clipboard.writeText(url).then(() => {
            setStatus('Link copied!', 'done');
            setTimeout(() => setStatus('Ready', ''), 2000);
        });
    }

    // Load shared code from URL
    const params = new URLSearchParams(window.location.search);
    if (params.has('code')) {
        try {
            const code = decodeURIComponent(escape(atob(params.get('code'))));
            document.getElementById('editor').value = code;
        } catch(e) {}
    }

    // Resizable divider
    const divider = document.getElementById('divider');
    let isDragging = false;
    divider.addEventListener('mousedown', () => isDragging = true);
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const main = document.querySelector('.main');
        const panels = main.querySelectorAll('.panel');
        const rect = main.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        panels[0].style.flex = ratio;
        panels[1].style.flex = 1 - ratio;
    });
    document.addEventListener('mouseup', () => isDragging = false);
    </script>
</body>
</html>
